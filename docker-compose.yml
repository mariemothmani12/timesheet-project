version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: timesheet-mysql
    environment:
      MYSQL_ROOT_PASSWORD: secret123   # ton mot de passe
      MYSQL_DATABASE: timesheetdb
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - timesheetvol:/var/lib/mysql

  timesheet:
    build: .
    container_name: timesheet-app
    depends_on:
      - mysql
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/timesheetdb
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: password
    restart: unless-stopped

volumes:
  timesheetvol:
